setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g repeat-time 1000

# Override default shortcut
unbind C-b
set-option -g prefix C-s
bind-key C-s send-prefix

# Start new window from current pane
bind c new-window -c "#{pane_current_path}"
# Do not confirm kills
bind-key x kill-pane
bind-key & kill-window

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -r -T prefix H resize-pane -L
bind-key -r -T prefix J resize-pane -D
bind-key -r -T prefix K resize-pane -U
bind-key -r -T prefix L resize-pane -R

# Enable mouse
set -g mouse on

# Fix photos
set-option -g allow-passthrough on

# Nvim fix
set-option -sg escape-time 10
set-option -g focus-events on

set -g default-terminal "screen-256color"

bind-key -T copy-mode-vi 'v' send -X begin-selection     # Begin selection in copy mode.
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Begin selection in copy mode.
bind-key -T copy-mode-vi 'y' send -X copy-selection      # Yank selection in copy mode.

# DESIGN TWEAKS

# don't do anything when a 'bell' rings
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# clock mode
setw -g clock-mode-colour yellow

# copy mode
setw -g mode-style 'fg=black bg=blue bold'

# panes
set -g pane-border-style 'fg=blue'
set -g pane-active-border-style 'fg=yellow'

# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=blue'

set -g status-left ''
set -g status-left-length 10

set -g status-right-style 'fg=black bg=yellow'
set -g status-right '%Y-%m-%d %H:%M '
set -g status-right-length 50

setw -g window-status-current-style 'fg=black bg=blue'
setw -g window-status-current-format ' #I #W #F '

setw -g window-status-style 'fg=blue bg=black'
setw -g window-status-format ' #I #[fg=white]#W #[fg=yellow]#F '

setw -g window-status-bell-style 'fg=yellow bg=blue bold'

# messages
set -g message-style 'fg=yellow bg=blue bold'
